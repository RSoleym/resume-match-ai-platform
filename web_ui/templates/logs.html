{% extends "base.html" %}
{% set active = "logs" %}
{% block content %}
  <div class="flex flex-col gap-2 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <h1 class="text-2xl font-semibold">Logs</h1>
      <p class="mt-1 text-sm text-slate-400">Live stdout/stderr while scripts run.</p>
    </div>
  </div>

  <div class="mt-6 rounded-3xl bg-white/5 p-5 ring-soft">
    <div class="flex items-center justify-between text-sm">
      <div>
        <div class="text-slate-200 font-semibold" id="statusMessage">Loading…</div>
        <div class="text-slate-400 text-xs mt-1">
          Step: <span class="text-slate-200" id="statusStep">—</span> •
          Elapsed: <span class="text-slate-200" id="statusElapsed">0s</span>
        </div>
      </div>
      <div class="text-slate-200 font-semibold" id="statusPct">0%</div>
    </div>
    <div class="mt-3 h-2 w-full rounded-full bg-black/30 ring-soft">
      <div id="statusBar" class="h-2 rounded-full bg-gradient-to-r from-indigo-500 to-fuchsia-500" style="width: 0%"></div>
    </div>
    <div class="mt-4 grid gap-2 sm:grid-cols-3" id="statusSteps"></div>
  </div>

  <div class="mt-6 grid gap-4 lg:grid-cols-2">
    <div class="rounded-3xl bg-white/5 p-5 ring-soft">
      <div class="text-sm font-semibold">stdout</div>
      <pre id="tailStdout" class="mt-3 max-h-[520px] overflow-auto rounded-2xl bg-black/30 p-4 text-xs text-slate-200 ring-soft whitespace-pre-wrap">{{ stdout }}</pre>
    </div>
    <div class="rounded-3xl bg-white/5 p-5 ring-soft">
      <div class="text-sm font-semibold">stderr</div>
      <pre id="tailStderr" class="mt-3 max-h-[520px] overflow-auto rounded-2xl bg-black/30 p-4 text-xs text-slate-200 ring-soft whitespace-pre-wrap">{{ stderr }}</pre>
    </div>
  </div>
{% endblock %}

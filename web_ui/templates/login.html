{% extends "base.html" %}
{% set active = "login" %}
{% block content %}
  <div class="mx-auto max-w-md">
    <h1 class="text-2xl font-semibold">Sign in</h1>
    <p class="mt-1 text-sm text-slate-400">Use your verified email and password.</p>

    <div class="mt-6 rounded-3xl bg-white/5 p-5 ring-soft">
      <form method="post" action="{{ url_for('login_submit') }}" class="space-y-4">
        <input type="hidden" name="next" value="{{ next_url or '' }}">
        <label class="block">
          <span class="text-sm text-slate-300">Email</span>
          <input name="email" type="email" required class="mt-2 w-full rounded-2xl bg-black/20 px-4 py-3 text-sm ring-soft">
        </label>
        <label class="block">
          <span class="text-sm text-slate-300">Password</span>
          <input name="password" type="password" required class="mt-2 w-full rounded-2xl bg-black/20 px-4 py-3 text-sm ring-soft">
        </label>
        <button class="w-full rounded-2xl bg-indigo-600 px-4 py-3 text-sm font-semibold hover:bg-indigo-500" type="submit">Sign in</button>
      </form>
    </div>

    <div class="mt-4 text-sm text-slate-400">
      Need an account?
      <a href="{{ url_for('signup_page') }}" class="font-semibold text-indigo-300 hover:text-indigo-200">Create one</a>
    </div>
  </div>
{% endblock %}
